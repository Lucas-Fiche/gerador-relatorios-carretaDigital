<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    :root { --verde: #16a34a; --azul: #0ea5e9; }
    * { box-sizing: border-box; }
    body {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 13px;
      color: #1f2937;
      margin: 0;
      padding: 12px;
    }
    h2 { font-size: 15px; margin: 0 0 4px; }
    .sub { color: #6b7280; font-size: 12px; margin-bottom: 12px; }
    .secao { margin-bottom: 16px; }
    label.titulo { display: block; font-weight: bold; margin-bottom: 6px; }
    select, input[type="number"] {
      width: 100%; padding: 7px; border: 1px solid #d1d5db; border-radius: 6px;
      font-size: 13px;
    }
    .linha { display: flex; gap: 8px; }
    .linha > * { flex: 1; }
    .lista {
      border: 1px solid #e5e7eb; border-radius: 8px; max-height: 240px;
      overflow-y: auto; padding: 4px;
    }
    .item {
      display: flex; align-items: center; gap: 8px; padding: 6px 8px;
      border-radius: 6px;
    }
    .item:hover { background: #f3f4f6; }
    .item .nome { font-weight: bold; }
    .item .cargo { color: #6b7280; font-size: 11px; }
    .todos {
      display: flex; align-items: center; gap: 8px; padding: 8px;
      background: #ecfdf5; border: 1px solid #a7f3d0; border-radius: 8px;
      margin-bottom: 8px; font-weight: bold;
    }
    button {
      width: 100%; padding: 11px; border: none; border-radius: 8px;
      background: var(--verde); color: #fff; font-size: 14px; font-weight: bold;
      cursor: pointer;
    }
    button:disabled { background: #9ca3af; cursor: not-allowed; }
    .status { margin-top: 12px; font-size: 12px; }
    .erro { color: #b91c1c; }
    .ok { color: #15803d; }
    .resultados a { display: block; margin: 3px 0; color: var(--azul); }
    .spinner {
      display: inline-block; width: 14px; height: 14px; border: 2px solid #d1d5db;
      border-top-color: var(--verde); border-radius: 50%; animation: spin 0.8s linear infinite;
      vertical-align: middle; margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .contador { font-size: 12px; color: #6b7280; margin-top: 4px; }
  </style>
</head>
<body>
  <h2>Gerador de Relatórios</h2>
  <div class="sub">Carreta Digital — recibos / prestação de contas</div>

  <div class="secao">
    <label class="titulo">1) Mês de competência</label>
    <div class="linha">
      <select id="mes"></select>
      <input type="number" id="ano" min="2020" max="2100" />
    </div>
  </div>

  <div class="secao">
    <label class="titulo">2) Colaboradores</label>
    <div class="todos">
      <input type="checkbox" id="chkTodos" />
      <label for="chkTodos">Gerar para TODOS os colaboradores</label>
    </div>
    <div id="lista" class="lista">
      <div class="contador"><span class="spinner"></span>Carregando...</div>
    </div>
    <div class="contador" id="contador"></div>
  </div>

  <button id="btnGerar" onclick="gerar()" disabled>Gerar relatórios (PDF)</button>

  <div id="status" class="status"></div>

  <script>
    var colaboradores = [];

    // --- Inicialização ---
    function init() {
      var meses = ['janeiro','fevereiro','março','abril','maio','junho',
                   'julho','agosto','setembro','outubro','novembro','dezembro'];
      var hoje = new Date();
      var selMes = document.getElementById('mes');
      meses.forEach(function (m, i) {
        var opt = document.createElement('option');
        opt.value = i;
        opt.textContent = m.charAt(0).toUpperCase() + m.slice(1);
        if (i === hoje.getMonth()) opt.selected = true;
        selMes.appendChild(opt);
      });
      document.getElementById('ano').value = hoje.getFullYear();

      google.script.run
        .withSuccessHandler(montarLista)
        .withFailureHandler(falha)
        .getColaboradores();
    }

    function montarLista(lista) {
      colaboradores = lista || [];
      var div = document.getElementById('lista');
      div.innerHTML = '';
      if (colaboradores.length === 0) {
        div.innerHTML = '<div class="contador">Nenhum colaborador encontrado na aba.</div>';
        return;
      }
      colaboradores.forEach(function (c) {
        var item = document.createElement('div');
        item.className = 'item';
        item.innerHTML =
          '<input type="checkbox" class="chk" value="' + c.rowIndex + '" onchange="atualizarContador()" />' +
          '<div><div class="nome">' + escapeHtml(c.nome) + '</div>' +
          (c.cargo ? '<div class="cargo">' + escapeHtml(c.cargo) + '</div>' : '') + '</div>';
        item.querySelector('input').id = 'chk_' + c.rowIndex;
        // clicar na linha marca a checkbox
        item.addEventListener('click', function (e) {
          if (e.target.tagName !== 'INPUT') {
            var cb = item.querySelector('input');
            cb.checked = !cb.checked;
            atualizarContador();
          }
        });
        div.appendChild(item);
      });
      document.getElementById('btnGerar').disabled = false;
      atualizarContador();
    }

    function checkboxes() {
      return Array.prototype.slice.call(document.querySelectorAll('.chk'));
    }

    document.addEventListener('change', function (e) {
      if (e.target && e.target.id === 'chkTodos') {
        var on = e.target.checked;
        checkboxes().forEach(function (cb) {
          cb.checked = on;
          cb.disabled = on;
        });
        atualizarContador();
      }
    });

    function atualizarContador() {
      var todos = document.getElementById('chkTodos').checked;
      var n = todos ? colaboradores.length
                    : checkboxes().filter(function (cb) { return cb.checked; }).length;
      document.getElementById('contador').textContent =
        n + ' de ' + colaboradores.length + ' selecionado(s)';
    }

    // --- Geração ---
    function gerar() {
      var todos = document.getElementById('chkTodos').checked;
      var rowIndexes = checkboxes()
        .filter(function (cb) { return cb.checked; })
        .map(function (cb) { return parseInt(cb.value, 10); });

      if (!todos && rowIndexes.length === 0) {
        setStatus('<span class="erro">Selecione ao menos um colaborador.</span>');
        return;
      }

      var payload = {
        todos: todos,
        rowIndexes: rowIndexes,
        mes: parseInt(document.getElementById('mes').value, 10),
        ano: parseInt(document.getElementById('ano').value, 10)
      };

      var btn = document.getElementById('btnGerar');
      btn.disabled = true;
      var total = todos ? colaboradores.length : rowIndexes.length;
      setStatus('<span class="spinner"></span>Gerando ' + total + ' relatório(s)... isso pode levar alguns segundos.');

      google.script.run
        .withSuccessHandler(function (res) {
          btn.disabled = false;
          mostrarResultado(res);
        })
        .withFailureHandler(function (err) {
          btn.disabled = false;
          falha(err);
        })
        .gerarRelatorios(payload);
    }

    function mostrarResultado(res) {
      var html = '';
      if (res.gerados.length > 0) {
        html += '<div class="ok">✓ ' + res.gerados.length + ' relatório(s) gerado(s).</div>';
        html += '<div class="resultados">';
        res.gerados.forEach(function (g) {
          html += '<a href="' + g.url + '" target="_blank">📄 ' + escapeHtml(g.nome) + '</a>';
        });
        html += '<a href="' + res.pastaUrl + '" target="_blank"><b>📁 Abrir pasta no Drive</b></a>';
        html += '</div>';
      }
      if (res.erros && res.erros.length > 0) {
        html += '<div class="erro"><b>Erros:</b><br>' +
                res.erros.map(escapeHtml).join('<br>') + '</div>';
      }
      setStatus(html);
    }

    function falha(err) {
      setStatus('<span class="erro">Erro: ' + escapeHtml(err.message || err) + '</span>');
    }

    function setStatus(html) { document.getElementById('status').innerHTML = html; }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, function (c) {
        return { '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c];
      });
    }

    init();
  </script>
</body>
</html>
